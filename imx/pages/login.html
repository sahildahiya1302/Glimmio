<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:">
    <title>Login</title>
    <link rel="stylesheet" href="../css/login-style.css">
    <link rel="stylesheet" href="../css/instagram-theme.css">
    <link rel="stylesheet" href="../css/dark-theme.css">

</head>
<body>
    <button id="theme-toggle" style="position:absolute;top:10px;right:10px;">🌙</button>
    <div id="auth-container" class="login-container">
        <div id="login-form-container">
            <h1 id="login-title">Login</h1>
            <button id="google-login">Login with Google</button>
            <form id="email-login-form">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <input type="hidden" id="csrf_login" name="csrf_token" />
                <button type="submit">Login</button>
            </form>
            <p>Don't have an account? <button id="show-register" style="background:none; border:none; color:#D0007D; cursor:pointer; padding:0; font-size:1em;">Register</button></p>

    <!-- User Type Selection Modal -->
    <div id="user-type-modal" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; overflow:auto; background-color:rgba(0,0,0,0.5);">
        <div style="background-color:#fff; margin:15% auto; padding:20px; border:1px solid #888; width:280px; border-radius:8px; position:relative; text-align:center;">
            <span id="close-user-type" style="color:#aaa; position:absolute; right:10px; top:10px; font-size:28px; font-weight:bold; cursor:pointer;">&times;</span>
            <h2>Select User Type</h2>
            <button id="select-brand" style="margin:10px; padding:10px 20px; font-size:16px; cursor:pointer; border-radius:4px; border:1px solid #D0007D; background-color:white; color:#D0007D;">Brand</button>
            <button id="select-influencer" style="margin:10px; padding:10px 20px; font-size:16px; cursor:pointer; border-radius:4px; border:1px solid #D0007D; background-color:white; color:#D0007D;">Influencer</button>
        </div>
    </div>
        </div>

        <div id="register-form-container" style="display:none;">
            <h1 id="register-title">Register</h1>
            <form id="email-register-form">
                <input type="email" id="register-email" placeholder="Email" required>
                <input type="password" id="register-password" placeholder="Password" required>
                <input type="password" id="register-password-confirm" placeholder="Confirm Password" required>
                <input type="hidden" id="csrf_generic" name="csrf_token" />
                <label for="register-role">Register as</label>
                <select id="register-role">
                    <option value="brand">Brand</option>
                    <option value="influencer">Influencer</option>
                </select>
                <button type="submit">Register</button>
            </form>
            <p>Already have an account? <a href="#" id="show-login">Login here</a></p>
        </div>
    </div>

    <!-- Brand Registration Modal -->
    <div id="brand-register-modal" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; overflow:auto; background-color:rgba(0,0,0,0.5);">
        <div style="background-color:#fff; margin:10% auto; padding:20px; border:1px solid #888; width:300px; border-radius:8px; position:relative;">
            <span id="close-brand-register" style="color:#aaa; position:absolute; right:10px; top:10px; font-size:28px; font-weight:bold; cursor:pointer;">&times;</span>
            <h2>Register as Brand</h2>
            <form id="brand-register-form">
                <input type="email" id="brand-register-email" placeholder="Email" required style="width:100%; margin:8px 0; padding:8px; box-sizing:border-box;" />
                <input type="text" id="brand-register-company" placeholder="Company Name" required style="width:100%; margin:8px 0; padding:8px; box-sizing:border-box;" />
                <input type="url" id="brand-register-website" placeholder="Website" required style="width:100%; margin:8px 0; padding:8px; box-sizing:border-box;" />
                <input type="text" id="brand-register-industry" placeholder="Industry" required style="width:100%; margin:8px 0; padding:8px; box-sizing:border-box;" />
                <input type="password" id="brand-register-password" placeholder="Password" required style="width:100%; margin:8px 0; padding:8px; box-sizing:border-box;" />
                <input type="password" id="brand-register-password-confirm" placeholder="Confirm Password" required style="width:100%; margin:8px 0; padding:8px; box-sizing:border-box;" />
                <input type="hidden" id="csrf_brand" name="csrf_token" />
                <button type="submit" style="width:100%; padding:10px; background-color:#D0007D; color:white; border:none; cursor:pointer; font-size:16px; border-radius:4px;">Register</button>
            </form>
        </div>
    </div>

    <!-- Influencer Registration Modal -->
    <div id="influencer-register-modal" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; overflow:auto; background-color:rgba(0,0,0,0.5);">
        <div style="background-color:#fff; margin:10% auto; padding:20px; border:1px solid #888; width:300px; border-radius:8px; position:relative;">
            <span id="close-influencer-register" style="color:#aaa; position:absolute; right:10px; top:10px; font-size:28px; font-weight:bold; cursor:pointer;">&times;</span>
            <h2>Register as Influencer</h2>
            <form id="influencer-register-form">
                <input type="email" id="influencer-register-email" placeholder="Email" required style="width:100%; margin:8px 0; padding:8px; box-sizing:border-box;" />
                <input type="text" id="influencer-register-handle" placeholder="Instagram Handle" required style="width:100%; margin:8px 0; padding:8px; box-sizing:border-box;" />
                <input type="text" id="influencer-register-category" placeholder="Category" required style="width:100%; margin:8px 0; padding:8px; box-sizing:border-box;" />
                <input type="password" id="influencer-register-password" placeholder="Password" required style="width:100%; margin:8px 0; padding:8px; box-sizing:border-box;" />
                <input type="password" id="influencer-register-password-confirm" placeholder="Confirm Password" required style="width:100%; margin:8px 0; padding:8px; box-sizing:border-box;" />
                <input type="hidden" id="csrf_influencer" name="csrf_token" />
                <button type="submit" style="width:100%; padding:10px; background-color:#D0007D; color:white; border:none; cursor:pointer; font-size:16px; border-radius:4px;">Register</button>
            </form>
        </div>
    </div>

    <script>
        let csrfToken = '';
        let oauthConfig = null;
        fetch('/backend/config.php')
            .then(r => r.json())
            .then(d => { oauthConfig = d; });
        fetch('/backend/auth.php?action=csrf')
            .then(r => r.json())
            .then(d => {
                csrfToken = d.token;
                document.getElementById('csrf_login').value = csrfToken;
                document.getElementById('csrf_brand').value = csrfToken;
                document.getElementById('csrf_influencer').value = csrfToken;
                const gen = document.getElementById('csrf_generic');
                if (gen) gen.value = csrfToken;
            });

        // Modal open/close handlers
        const brandModal = document.getElementById('brand-register-modal');
        const influencerModal = document.getElementById('influencer-register-modal');
        const userTypeModal = document.getElementById('user-type-modal');
        const openRegisterBtn = document.getElementById('show-register');
        const closeUserTypeBtn = document.getElementById('close-user-type');
        const closeBrandBtn = document.getElementById('close-brand-register');
        const closeInfluencerBtn = document.getElementById('close-influencer-register');
        const selectBrandBtn = document.getElementById('select-brand');
        const selectInfluencerBtn = document.getElementById('select-influencer');
        const loginForm = document.getElementById('login-form-container');
        const registerForm = document.getElementById('register-form-container');
        const showLoginLink = document.getElementById('show-login');

        openRegisterBtn.onclick = () => {
            loginForm.style.display = 'none';
            userTypeModal.style.display = 'block';
        };
        closeUserTypeBtn.onclick = () => {
            userTypeModal.style.display = 'none';
            loginForm.style.display = 'block';
        };
        closeBrandBtn.onclick = () => {
            brandModal.style.display = 'none';
            loginForm.style.display = 'block';
        };
        closeInfluencerBtn.onclick = () => {
            influencerModal.style.display = 'none';
            loginForm.style.display = 'block';
        };

        selectBrandBtn.onclick = () => {
            userTypeModal.style.display = 'none';
            brandModal.style.display = 'block';
        };
        selectInfluencerBtn.onclick = () => {
            userTypeModal.style.display = 'none';
            influencerModal.style.display = 'block';
        };

        showLoginLink.onclick = (e) => {
            e.preventDefault();
            brandModal.style.display = 'none';
            influencerModal.style.display = 'none';
            userTypeModal.style.display = 'none';
            loginForm.style.display = 'block';
        };

        window.onclick = function(event) {
            if (event.target === brandModal) {
                brandModal.style.display = 'none';
                loginForm.style.display = 'block';
            }
            if (event.target === influencerModal) {
                influencerModal.style.display = 'none';
                loginForm.style.display = 'block';
            }
            if (event.target === userTypeModal) {
                userTypeModal.style.display = 'none';
                loginForm.style.display = 'block';
            }
        };

        // Login form submission
        document.getElementById('email-login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const response = await fetch('/backend/auth.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: new URLSearchParams({
                    action: 'login',
                    email: email,
                    password: password,
                    csrf_token: csrfToken
                })
            });
            const result = await response.json();
            alert(result.message);
            if (result.success && result.token) {
                localStorage.setItem('jwt', result.token);
            }
            if (result.success && result.redirect) {
                window.location.href = result.redirect;
            }
        });

        // Brand registration form submission
        document.getElementById('brand-register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('brand-register-email').value;
            const company = document.getElementById('brand-register-company').value;
            const website = document.getElementById('brand-register-website').value;
            const industry = document.getElementById('brand-register-industry').value;
            const password = document.getElementById('brand-register-password').value;
            const passwordConfirm = document.getElementById('brand-register-password-confirm').value;

            if (password !== passwordConfirm) {
                alert('Passwords do not match.');
                return;
            }

            const response = await fetch('/backend/auth.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: new URLSearchParams({
                    action: 'register',
                    email: email,
                    password: password,
                    role: 'brand',
                    company_name: company,
                    website: website,
                    industry: industry,
                    csrf_token: csrfToken
                })
            });
            const result = await response.json();
            alert(result.message);
            if (result.success) {
                brandModal.style.display = 'none';
            }
        });

        // Influencer registration form submission
        document.getElementById('influencer-register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('influencer-register-email').value;
            const handle = document.getElementById('influencer-register-handle').value;
            const category = document.getElementById('influencer-register-category').value;
            const password = document.getElementById('influencer-register-password').value;
            const passwordConfirm = document.getElementById('influencer-register-password-confirm').value;

            if (password !== passwordConfirm) {
                alert('Passwords do not match.');
                return;
            }

            const response = await fetch('/backend/auth.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: new URLSearchParams({
                    action: 'register',
                    email: email,
                    password: password,
                    role: 'influencer',
                    instagram_handle: handle,
                    category: category,
                    csrf_token: csrfToken
                })
            });
            const result = await response.json();
            alert(result.message);
            if (result.success && oauthConfig) {
                influencerModal.style.display = 'none';
                // Redirect to Instagram OAuth to fetch profile
                const scopes = 'pages_user_timezone,instagram_branded_content_creator,instagram_branded_content_brand,instagram_manage_events,instagram_business_basic,instagram_business_manage_messages,instagram_business_content_publish,instagram_business_manage_insights,instagram_business_manage_comments,pages_read_engagement,ads_management,instagram_content_publish,instagram_manage_comments';
                window.location.href = 'https://api.instagram.com/oauth/authorize?client_id=' +
                    encodeURIComponent(oauthConfig.instagramClientId) +
                    '&redirect_uri=' + encodeURIComponent(oauthConfig.instagramRedirect) +
                    '&scope=' + encodeURIComponent(scopes) +
                    '&response_type=code';
            }
        });
        if(localStorage.getItem('theme')==='dark'){
            document.body.classList.add('dark-mode');
        }
        document.getElementById('theme-toggle').addEventListener('click',()=>{
            const dark=document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme',dark?'dark':'light');
        });
    </script>
    <script src="/js/pixel.js"></script>
</body>
</html>
